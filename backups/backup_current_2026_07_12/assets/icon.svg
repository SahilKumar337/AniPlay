<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1b1c22" />
      <stop offset="100%" stop-color="#0c0d10" />
    </radialGradient>

    <!-- Ring/Accent Gradient -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>

    <!-- Drop Shadow for the Play Button -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="1024" height="1024" fill="url(#bg-grad)" />

  <!-- Stylized Decorative Background Paths (Elegant abstract geometric lines) -->
  <circle cx="512" cy="512" r="420" fill="none" stroke="url(#primary-grad)" stroke-width="2" opacity="0.07" />
  <circle cx="512" cy="512" r="340" fill="none" stroke="url(#primary-grad)" stroke-width="2" opacity="0.12" />

  <!-- Main Ring (Simple and Elegant) -->
  <circle cx="512" cy="512" r="240" fill="none" stroke="url(#primary-grad)" stroke-width="24" filter="url(#glow)" />

  <!-- Glowing Play Button Inside -->
  <!-- A perfectly balanced triangle representing Play -->
  <polygon points="452,382 632,512 452,642" fill="#ffffff" filter="url(#glow)" />
  <polygon points="452,382 632,512 452,642" fill="url(#primary-grad)" opacity="0.8" />
</svg>
